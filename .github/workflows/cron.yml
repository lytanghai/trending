- name: Check Production Health Endpoint
  run: |
    PROD_URL="https://trending-jzzf.onrender.com/health"
    echo "🏥 Checking health endpoint: $PROD_URL"
    echo "⏰ Time: $(date)"
    
    # Remove the -I flag to use GET instead of HEAD
    RESPONSE_CODE=$(curl \
      --silent \
      --output /dev/null \
      --write-out "%{http_code}" \
      --connect-timeout 15 \
      --max-time 30 \
      --retry 3 \
      --retry-delay 5 \
      "$PROD_URL")
    
    echo "HTTP Status: $RESPONSE_CODE"
    
    if [[ $RESPONSE_CODE -eq 200 ]]; then
      echo "✅ Health check passed!"
      # Optional: verify the response body
      BODY=$(curl --silent "$PROD_URL")
      echo "Response: $BODY"
    else
      echo "❌ Health check failed with status $RESPONSE_CODE"
      exit 1
    fi